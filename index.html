<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dice Quest</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    text-align: center;
    margin: 20px;
}

button {
    padding: 8px 16px;
    font-size: 1rem;
    margin: 5px;
    cursor: pointer;
    border-radius: 6px;
    border: none;
    background-color: #333;
    color: white;
}

#result {
    font-size: 1.2rem;
    margin: 20px;
    min-height: 50px;
}

.dice-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    margin-top: 15px;
    font-size: 20px;
}

.die {
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;

}

.die:hover {

}

.selected {
    /*outline: 4px solid gold;*/
}

.rolling {
    transform: scale(1.2);
    /*box-shadow: 0 0 15px gold;*/
}

.fade-out {
    opacity: 0;
    transform: scale(0.8);
}

#selectionCircle {
    width: 250px;
    height: 250px;

    border-radius: 50%;

}

#pow {

}    
#spd {

}

}    
#vit {

#stats{

}
#herocard{

    margin: 0 auto;
}
#herobox{
    width: 50%;
    height: 100%;
    text-align: center;
}

#healthbar{
    vertical-align: center;
    display: flex;
}

.bar {
  width: 90%;

#myval {

<body>

<div id="herobox">
<div id="herocard"><div>Hero</div>

</div>
<div id="stats"><span >POW: </span><span id="pow"></span>&nbsp;&nbsp;<span>SPD: </span><span id="spd"></span>&nbsp;&nbsp;<span>INT: </span><span id="int"></span>&nbsp;&nbsp;<span>VIT: </span><span id="vit"></span></div>
</div>

<h2 id="info">&nbsp;</h2>
<div id="selectionCircle"><button id="action" style="opacity: 0"></div>

<div id="diceContainer" class="dice-container"><button id="newdice" onclick="drawDice()">Draw New Dice</button></div>


<div id="result"></div>
<div>


<script>

// CONFIG
const dieTypes = [2,4,6,8,10,12,20];
const colors = ["red","green","purple","blue"];
const attackcolors = ["red","green","purple"];
const defensecolors = ["blue"]

skills ={"pow": 3,"spd": 0, "int": 0, "vit": 3};
const skillcolors = {"red": "pow", "green":"spd","purple":"int","blue":"vit"};
for (const key in skills) { document.getElementById(key).textContent=skills[key];}

// CLASS
class Die {
    constructor(sides,color,id,value){
        this.sides = sides;
        this.color = color;
        this.id = id;
        this.value = value;
    }
    roll(){
        return Math.floor(Math.random()*this.sides)+1;
    }
}

// BUILD DICE BAG
const diceBag = [];
let index = 0;

for(let color of colors){
    for(let sides of dieTypes){
        diceBag.push(new Die(sides,color,`die-${color}-${sides}-${index}`));
        index++;
    }
}

// STATE
let drawnDice = [];
let selectedDice = [];
let dieElements = new Map();
let originalPositions = new Map();

// 🔥 Dynamic Counters
let selectedColorCounts = {};
let selectedTypeCounts = {};

const diceContainer = document.getElementById("diceContainer");
const selectionCircle = document.getElementById("selectionCircle");
const info = document.getElementById("info");

const result = document.getElementById("result");

// UTIL
function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [array[i],array[j]] = [array[j],array[i]];
    }
}

// SHAPES
function getClipPath(sides){
    switch(sides){
        case 2: return "circle(30% at 50% 50%)";
        case 4: return "polygon(50% 0%, 7% 75%, 93% 75%)";
        case 6: return "polygon(15% 15%, 85% 15%, 85% 85%, 15% 85%)";
        case 8: return "polygon(50% 0%, 85% 50%, 50% 100%, 15% 50%)";
        case 10: return "polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)";
        case 12: return "polygon(50% 5%, 76% 14%, 93% 36%, 93% 64%, 76% 86%, 50% 95%, 24% 86%, 7% 64%, 7% 36%, 24% 14%)";
        case 20: return "polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%)";
        default: return "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)";
    }
}
function setSVGSize(svgElement, width, height) {
    // Set width and height attributes
    svgElement.setAttribute("width", width);
    svgElement.setAttribute("height", height);
    
    // Ensure the viewBox attribute is present for correct scaling
    // (If the original file is missing it, you may need to define it based on its content)
}

async function loadSVG(filename, container,w,h,sides) {
    try {
        // 1. Fetch the SVG file content from the server
        const response = await fetch(filename);
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        const svgText = await response.text();

        // 2. Get the target container div
        //const container = document.getElementById(containerId);

        if (container) {
            // 3. Insert the raw SVG markup into the div
            container.innerHTML = svgText;
            console.log("SVG loaded successfully!");
            const svgElement = container.querySelector('svg');

            if (svgElement) {
            // Proceed to Step 2 to change the size
                setSVGSize(svgElement, w, h);

        		//svgElement.style='z-index:-100'
        		svgElement.setAttribute('viewBox', '-90 -90 180 180');
        		const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
				svgElement.appendChild(text);
				text.setAttribute("x", -1);
				text.setAttribute("y", 0);
				text.setAttribute("fill", 'white');
				text.setAttribute("text-anchor","middle")
				text.setAttribute("alignment-baseline","middle")
				text.setAttribute("font-size", 30);
				text.textContent = sides;
        }
        } else {
            console.error(`Container with ID "${containerId}" not found.`);
        }

    } catch (error) {
        console.error("Error loading the SVG file:", error);
    }
}

// DRAW
function drawDice(){

    selectionCircle.innerHTML="";
    selectionCircle.innerHTML="<button id='action'>";
    const action = document.getElementById("action");
    const rect = selectionCircle.getBoundingClientRect();
    const cx = rect.width/2;
    const cy = rect.height/2;

        action.style.position="absolute";
        action.style.left=cx+"px";
        action.style.top=cy+"px";
        action.style.transform="translate(-60%, -70%)";
    action.textContent="Roll";
    action.onclick=rollSelected;
    result.textContent="Select up to 5 dice."

    diceContainer.innerHTML="";

    selectedDice = [];
    dieElements.clear();
    originalPositions.clear();

    // 🔥 Reset counters dynamically
    selectedColorCounts = {};
    selectedTypeCounts = {};

    colors.forEach(c => selectedColorCounts[c] = 0);
    dieTypes.forEach(t => selectedTypeCounts[t] = 0);

    const bagCopy = [...diceBag];
    shuffle(bagCopy);
    drawnDice = bagCopy.slice(0,8);

    drawnDice.forEach((die,index)=>{
        const dieEl = document.createElement("div");
        //dieEl.classList.add("die");
        //dieEl.style.backgroundColor = die.color;
        dieEl.textContent = `D${die.sides}`;
        //dieEl.style.clipPath = getClipPath(die.sides);

        dieElements.set(die, dieEl);
        originalPositions.set(die,index);

        dieEl.addEventListener("click", ()=>toggleSelect(die));
        file='dice/d'+die.sides+die.color+'2.svg';
        console.log(file)
        loadSVG(file,dieEl,80,80,die.sides)

        diceContainer.appendChild(dieEl);
    });

    //document.getElementById("result").textContent = "Click dice to select";

    console.log("Color Counts:", selectedColorCounts);
    console.log("Type Counts:", selectedTypeCounts);
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// SELECT / DESELECT
function toggleSelect(die){
    const dieEl = dieElements.get(die);

    if(selectedDice.includes(die)){

        selectedDice = selectedDice.filter(d=>d!==die);
        selectedColorCounts[die.color]--;
        selectedTypeCounts[die.sides]--;

        dieEl.classList.remove("selected");

        dieEl.style.position = "";
        dieEl.style.left = "";
        dieEl.style.top = "";
        dieEl.style.transform = "";

        const children = Array.from(diceContainer.children);
        const index = originalPositions.get(die);

        if(index >= children.length){
            diceContainer.appendChild(dieEl);
        } else {
            diceContainer.insertBefore(dieEl, children[index]);
        }

    } else {

        if(selectedDice.length>=5) return;

        selectedDice.push(die);
        selectedColorCounts[die.color]++;
        selectedTypeCounts[die.sides]++;

        dieEl.classList.add("selected");
        selectionCircle.appendChild(dieEl);
    }

    rearrangeCircle();

    // Debug view (console only)
    console.log("Color Counts:", selectedColorCounts);
    console.log("Type Counts:", selectedTypeCounts);
}

// PENTAGON LAYOUT
function rearrangeCircle(){
    const rect = selectionCircle.getBoundingClientRect();
    const cx = rect.width/2;
    const cy = rect.height/2;
    const radius = 75;
    const count = selectedDice.length;

    selectedDice.forEach((die,index)=>{
        const el = dieElements.get(die);
        const angle = (index/count)*2*Math.PI - Math.PI/2;
        const x = cx + radius*Math.cos(angle);
        const y = cy + radius*Math.sin(angle);

        el.style.position="absolute";
        el.style.left=x+"px";
        el.style.top=y+"px";
        el.style.transform="translate(-50%, -50%)";
    });
}

// ROLL
function animateRoll(die, element){
    return new Promise(resolve=>{
        element.classList.add("rolling");
        const svg=element.querySelector('svg');
        const text=svg.querySelector('text');
        document.getElementById("result").innerHTML ="";

        const interval = setInterval(()=>{
            text.textContent = Math.floor(Math.random()*die.sides)+1;
        },60);

        setTimeout(()=>{
            clearInterval(interval);
            const result = die.roll();
            text.textContent = result
            element.classList.remove("rolling");
            die.value=result;
            //console.log(die)
            resolve(result);
        },800);
    });
}

    for (const die of selectedDice){

    for (const key in skillcolors){

            document.getElementById("info").innerHTML = `<strong>Skill Bonus</strong>`;

                if (die.color==key){

async function rollSelected(){

    const rolls = await Promise.all(

    );
